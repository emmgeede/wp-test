services:
  wordpress:
    image: wordpress:6-php8.2-fpm
    container_name: wpt-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - ./php-uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      # Test plugins (each mounted individually)
      - ../Testplugins/advanced-custom-fields-pro:/var/www/html/wp-content/plugins/advanced-custom-fields-pro
      - ../Testplugins/advanced-custom-post-type:/var/www/html/wp-content/plugins/advanced-custom-post-type
      - ../Testplugins/custom-post-type-ui:/var/www/html/wp-content/plugins/custom-post-type-ui
      - ../Testplugins/jet-engine:/var/www/html/wp-content/plugins/jet-engine
      - ../Testplugins/meta-box:/var/www/html/wp-content/plugins/meta-box
      - ../Testplugins/meta-box-aio:/var/www/html/wp-content/plugins/meta-box-aio
      # Must-use plugins
      - ../mu-plugins:/var/www/html/wp-content/mu-plugins
      # Import data (for provision.sh)
      - ../Import-Data:/tmp/import-data:ro
      # Setup and import scripts
      - ./wp-setup.sh:/tmp/wp-setup.sh:ro
      - ./acpt-import.php:/tmp/acpt-import.php:ro
    command: >
      bash -c '
        bash /tmp/wp-setup.sh &
        docker-entrypoint.sh php-fpm
      '
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wptest

  db:
    image: mysql:8.0
    container_name: wpt-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wptest

  caddy:
    image: caddy:2-alpine
    container_name: wpt-caddy
    restart: unless-stopped
    ports:
      - "8089:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - wordpress_data:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - wordpress
    networks:
      - wptest

volumes:
  wordpress_data:
  db_data:
  caddy_data:
  caddy_config:

networks:
  wptest:
    driver: bridge
